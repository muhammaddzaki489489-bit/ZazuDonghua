<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZazuDonghua - Streaming Donghua</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

  <nav class="bg-gray-900 border-b border-gray-800 sticky top-0 z-50 px-4 py-3">
    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
      <a href="index.html" class="text-2xl font-black tracking-wider text-cyan-400 drop-shadow-[0_0_8px_rgba(34,211,238,0.3)]">
        ZAZU<span class="text-white">DONGHUA</span>
      </a>
      <div class="flex w-full sm:w-auto max-w-md gap-2">
        <input id="search-input" type="text" placeholder="Cari donghua kesukaanmu..." class="w-full bg-gray-800 text-sm border border-gray-700 rounded-lg px-4 py-2 focus:outline-none focus:border-cyan-400">
        <button onclick="executeSearch()" class="bg-cyan-500 hover:bg-cyan-600 text-gray-950 text-sm font-bold px-4 py-2 rounded-lg transition">Cari</button>
      </div>
    </div>
  </nav>

  <main class="max-w-7xl mx-auto px-4 py-8">
    <h2 id="section-title" class="text-xl font-bold mb-6 flex items-center gap-2 border-l-4 border-cyan-400 pl-3">
      🔥 UPDATE EPISODE TERBARU
    </h2>
    
    <div id="anime-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
      </div>
  </main>

  <script>
    const API_BASE = '/api';

    async function loadHome() {
      const grid = document.getElementById('anime-grid');
      grid.innerHTML = '<p class="text-gray-400 col-span-full text-center py-10">Mengambil data...</p>';
      try {
        const res = await fetch(`${API_BASE}/home`);
        const result = await res.json();
        renderCards(result.data.items);
      } catch (err) {
        grid.innerHTML = `<p class="text-red-500 col-span-full text-center py-10">Error: ${err.message}</p>`;
      }
    }

    async function executeSearch() {
      const query = document.getElementById('search-input').value.trim();
      if (!query) return;
      const grid = document.getElementById('anime-grid');
      const title = document.getElementById('section-title');
      
      title.innerText = `🔍 HASIL PENCARIAN: ${query.toUpperCase()}`;
      grid.innerHTML = '<p class="text-gray-400 col-span-full text-center py-10">Mencari...</p>';
      
      try {
        const res = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}`);
        const result = await res.json();
        renderCards(result.data.items);
      } catch (err) {
        grid.innerHTML = `<p class="text-red-500 col-span-full text-center py-10">Error: ${err.message}</p>`;
      }
    }

    function renderCards(items) {
      const grid = document.getElementById('anime-grid');
      grid.innerHTML = '';
      if (!items || items.length === 0) {
        grid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-10">Data tidak ditemukan.</p>';
        return;
      }
      items.forEach(item => {
        const slug = item.url.split('/').filter(Boolean).pop();
        const card = document.createElement('div');
        card.className = 'bg-gray-900 rounded-lg overflow-hidden border border-gray-800 hover:border-cyan-500/50 transition duration-300 flex flex-col group cursor-pointer';
        card.setAttribute('onclick', `goToDetail('${slug}')`);
        card.innerHTML = `
          <div class="relative aspect-[3/4] bg-gray-800 overflow-hidden">
            <img src="${item.poster}" alt="${item.title}" class="w-full h-full object-cover group-hover:scale-105 transition duration-300" loading="lazy">
            <span class="absolute bottom-2 left-2 bg-cyan-500 text-gray-950 text-xs font-black px-2 py-0.5 rounded shadow">
              ${item.episode || item.status || 'Sub'}
            </span>
          </div>
          <div class="p-3 flex-1 flex flex-col justify-between">
            <h3 class="text-sm font-semibold line-clamp-2 group-hover:text-cyan-400 transition">${item.title}</h3>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function goToDetail(slug) {
      window.location.href = `watch.html?slug=${slug}`;
    }

    window.onload = loadHome;
  </script>
</body>
</html>
